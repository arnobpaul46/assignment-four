<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- adding tailwind css -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
    <title>Job Tracker</title>
</head>

<body class="bg-[#F8FAFC]">
    <header class="w-[95%] md:w-[80%] mx-auto my-5 border-b-2 border-[#E6E7E9]">
        <h1 class="text-[#002C5C] text-3xl mb-2">Job Application Tracker</h1>
        <div class="grid grid-cols-3 gap-4 mb-6 ">
            <div class="total-btn bg-[#FFFFFF] rounded-sm ">
                 <h3 class="text-xl text-[#323B49]">Total</h3>
                <span class="text-[#002c5c] text-2xl">8</span>
            </div>
            <div class="interview-btn bg-[#FFFFFF] rounded-sm">
                <h3 class="text-xl text-[#323B49]">Interview</h3>
                <span class="text-[#10B981] text-2xl">0</span>
            </div>
            <div class="rejected-btn bg-[#FFFFFF] rounded-sm">
                <h3 class="text-xl text-[#323B49]">Rejected</h3>
                <span class="text-[#EF4444] text-2xl">0</span>
            </div>
        </div>
    </header>
</body>

</html>
